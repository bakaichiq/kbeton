name: Deploy On Push

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on remote host
        run: |
          ssh -o StrictHostKeyChecking=yes "${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}" << 'EOF'
          set -euo pipefail
          cd "${{ secrets.DEPLOY_PATH }}"
          git fetch origin main
          git checkout main
          git pull --ff-only origin main
          docker build -f docker/Dockerfile.base -t kbeton-base:latest .
          docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
          for attempt in $(seq 1 24); do
            if curl --fail --silent http://127.0.0.1:8000/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose ps
          docker compose logs --tail=100 api
          exit 1
          EOF
